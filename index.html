<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pricing Sensitivity Calculator</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #f4f6f9; color: #1a1d23;
      min-height: 100vh; display: flex; flex-direction: column;
      align-items: center; padding: 40px 20px;
    }
    h1 { font-size: 1.75rem; font-weight: 700; margin-bottom: 6px; }
    .subtitle { color: #6b7280; margin-bottom: 32px; font-size: 0.95rem; }
    .card {
      background: #fff; border-radius: 12px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.08);
      padding: 28px 32px; width: 100%; max-width: 700px; margin-bottom: 32px;
    }
    .input-group { display: flex; flex-direction: column; gap: 6px; }
    label { font-weight: 600; font-size: 0.9rem; color: #374151; }
    .input-row { display: flex; gap: 12px; align-items: center; }
    .prefix { font-size: 1.1rem; font-weight: 600; color: #6b7280; }
    input[type="number"] {
      flex: 1; padding: 10px 14px; border: 1.5px solid #d1d5db;
      border-radius: 8px; font-size: 1.1rem; transition: border-color 0.2s; outline: none;
    }
    input[type="number"]:focus { border-color: #4f46e5; }
    .hint { font-size: 0.8rem; color: #9ca3af; }
    .table-wrapper { width: 100%; max-width: 700px; overflow-x: auto; }
    table {
      width: 100%; border-collapse: collapse; background: #fff;
      border-radius: 12px; overflow: hidden;
      box-shadow: 0 2px 12px rgba(0,0,0,0.08);
    }
    thead tr { background: #4f46e5; color: #fff; }
    thead th {
      padding: 14px 20px; text-align: left; font-size: 0.85rem;
      font-weight: 600; letter-spacing: 0.04em; text-transform: uppercase;
    }
    tbody tr { border-bottom: 1px solid #f0f1f3; transition: background 0.15s; }
    tbody tr:last-child { border-bottom: none; }
    tbody tr:hover { background: #f5f3ff; }
    tbody td { padding: 13px 20px; font-size: 0.95rem; }
    .margin-col { font-weight: 700; color: #4f46e5; }
    .price-col  { font-weight: 600; }
    .profit-col { color: #059669; font-weight: 500; }
    .badge { display: inline-block; padding: 2px 8px; border-radius: 999px; font-size: 0.75rem; font-weight: 600; }
    .badge-low  { background: #fef9c3; color: #92400e; }
    .badge-mid  { background: #dbeafe; color: #1e40af; }
    .badge-high { background: #d1fae5; color: #065f46; }
    .empty-state { text-align: center; padding: 40px 20px; color: #9ca3af; font-size: 0.95rem; }
  </style>
</head>
<body>
  <h1>Pricing Sensitivity Calculator</h1>
  <p class="subtitle">Enter your cost to see the recommended price at each profit margin target.</p>
  <div class="card">
    <div class="input-group">
      <label for="costInput">Product / Service Cost</label>
      <div class="input-row">
        <span class="prefix">$</span>
        <input id="costInput" type="number" min="0" step="0.01"
          placeholder="e.g. 100.00" oninput="buildTable()" />
      </div>
      <span class="hint">Profit margin = (Price − Cost) / Price × 100</span>
    </div>
  </div>
  <div class="table-wrapper">
    <table>
      <thead>
        <tr>
          <th>Margin %</th><th>Selling Price</th><th>Gross Profit $</th><th>Tier</th>
        </tr>
      </thead>
      <tbody id="tableBody">
        <tr><td colspan="4" class="empty-state">Enter a cost above to generate the table.</td></tr>
      </tbody>
    </table>
  </div>
  <script>
    function buildTable() {
      const input = document.getElementById('costInput');
      const tbody = document.getElementById('tableBody');
      const cost  = parseFloat(input.value);
      if (!input.value || isNaN(cost) || cost <= 0) {
        tbody.innerHTML = '<tr><td colspan="4" class="empty-state">Enter a valid cost above to generate the table.</td></tr>';
        return;
      }
      const margins = [50, 55, 60, 65, 70, 75, 80];
      tbody.innerHTML = margins.map(margin => {
        const price  = cost / (1 - margin / 100);
        const profit = price - cost;
        let tier, badgeClass;
        if (margin <= 60)      { tier = 'Entry';    badgeClass = 'badge-low';  }
        else if (margin <= 70) { tier = 'Standard'; badgeClass = 'badge-mid';  }
        else                   { tier = 'Premium';  badgeClass = 'badge-high'; }
        return `<tr>
          <td class="margin-col">${margin}%</td>
          <td class="price-col">$${price.toFixed(2)}</td>
          <td class="profit-col">$${profit.toFixed(2)}</td>
          <td><span class="badge ${badgeClass}">${tier}</span></td>
        </tr>`;
      }).join('');
    }
  </script>
</body>
</html>
